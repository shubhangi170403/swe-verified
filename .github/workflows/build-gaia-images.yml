name: Build GAIA Images

run-name: >-
  Build GAIA Images
  ${{ github.event_name == 'workflow_dispatch' && inputs.sdk-commit != '' && format('(SDK: {0})', inputs.sdk-commit) || '' }}

on:
  # Called from evaluation repo (eval-job.yml) to build images before K8s evaluation
  workflow_call:
    inputs:
      sdk-commit:
        description: 'Software Agent SDK commit/ref to use'
        required: true
        type: string
      benchmarks-ref:
        description: 'Benchmarks repo ref to checkout (for cross-repo calls)'
        required: false
        type: string
        default: ''
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      sdk-commit:
        description: 'Software Agent SDK commit/ref to use'
        required: true
        type: string
      extensions-ref:
        description: 'Extensions repository branch/ref to use (for testing feature branches with skills/plugins). Leave blank to use main.'
        required: false
        default: 'main'
        type: string
      force-build:
        description: 'Rebuild images even if matching remote tags already exist'
        required: false
        default: 'false'
        type: string

concurrency:
  group: build-gaia-${{ inputs.sdk-commit || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       github.event.label.name == 'build-gaia')

    timeout-minutes: 600  # 10h — matches the old orchestrate_eval.py polling bound in the evaluation repo

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      issues: write

    steps:
      - name: Determine checkout ref
        id: checkout-ref
        run: |
          if [ -n "${{ inputs.benchmarks-ref }}" ]; then
            echo "ref=${{ inputs.benchmarks-ref }}" >> "$GITHUB_OUTPUT"
            echo "Using benchmarks-ref: ${{ inputs.benchmarks-ref }}"
          elif [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "Using PR head SHA: ${{ github.event.pull_request.head.sha }}"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "Using default ref (the commit that triggered this workflow)"
          fi

      - uses: actions/checkout@v6
        with:
          repository: OpenHands/benchmarks
          ref: ${{ steps.checkout-ref.outputs.ref }}
          submodules: recursive
          token: ${{ github.token }}

      - name: Update SDK submodule
        if: ${{ inputs.sdk-commit != '' }}
        run: |
          cd vendor/software-agent-sdk
          git fetch origin ${{ inputs.sdk-commit }}
          git checkout FETCH_HEAD
          SDK_SHA=$(git rev-parse HEAD)
          cd ../..
          git add vendor/software-agent-sdk
          echo "Updated SDK submodule to $SDK_SHA (from ${{ inputs.sdk-commit }})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          make build

      - name: Build and push GAIA image with MCP layer
        run: |
          set -euo pipefail
          FORCE_BUILD="${{ inputs.force-build || 'false' }}"

          # GAIA requires 'binary' target to include Chromium for browser operations
          TARGET="binary"

          CMD="uv run benchmarks/gaia/build_images.py \
            --image ghcr.io/openhands/eval-agent-server \
            --target ${TARGET} \
            --push"

          if [ "${FORCE_BUILD}" = "true" ]; then
            CMD="$CMD --force-build"
          fi

          echo "Running: $CMD"
          eval "$CMD"

          echo "✅ GAIA image with MCP layer built and pushed successfully"
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
          EXTENSIONS_REF: ${{ inputs.extensions-ref || 'main' }}

      - name: Archive build logs
        if: always()
        run: |
          if [ -d builds ]; then
            tar -czf build-logs.tar.gz builds/
            echo "Build logs archived successfully"
          else
            echo "No builds directory found"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ github.run_id }}
          path: build-logs.tar.gz
          retention-days: 7
          if-no-files-found: warn

      - name: Display build summary
        if: always()
        run: |
          uv run python -m benchmarks.scripts.summarize_build_manifests \
            --build-root builds \
            --title "GAIA Image Build Summary" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on tracker issue
        if: success()
        run: |
          # Get SDK version
          SDK_SHA=$(git submodule status vendor/software-agent-sdk | awk '{print $1}' | sed 's/^[+-]//')
          SDK_SHA_SHORT=${SDK_SHA:0:7}

          # Read the single manifest file
          MANIFEST_FILE=$(find builds -name "manifest.jsonl" -type f 2>/dev/null | head -1 || true)

          if [ -z "$MANIFEST_FILE" ]; then
            echo "No manifest file found"
            exit 0
          fi

          # Extract the image tag from the manifest
          IMAGE_TAG=$(cat "$MANIFEST_FILE" | python3 -c "import sys, json; data = json.loads(sys.stdin.read()); tags = data.get('tags', []); print(tags[0] if tags else 'unknown')")

          if [ "$IMAGE_TAG" = "unknown" ]; then
            echo "No valid image tag found in manifest"
            exit 0
          fi

          # Determine trigger source
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER="Manual trigger (workflow_dispatch)"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            TRIGGER="Pull request [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})"
          else
            TRIGGER="${{ github.event_name }}"
          fi

          # Post comment using jq to properly handle multi-line content
          jq -n \
            --arg sdk_short "${SDK_SHA_SHORT}" \
            --arg sdk_full "${SDK_SHA}" \
            --arg image "${IMAGE_TAG}" \
            --arg run_id "${{ github.run_id }}" \
            --arg server_url "${{ github.server_url }}" \
            --arg repo "${{ github.repository }}" \
            --arg trigger "${TRIGGER}" \
            '{body: "## GAIA Image Build Complete ✅\n\n**SDK Version:** [`\($sdk_short)`](https://github.com/OpenHands/software-agent-sdk/commit/\($sdk_full))\n**Image:** `\($image)` ⚡ _(includes pre-cached MCP server)_\n**Workflow Run:** [#\($run_id)](\($server_url)/\($repo)/actions/runs/\($run_id))\n**Triggered by:** \($trigger)\n\nThe image includes pre-cached `mcp-server-fetch` to eliminate 1-18 minute startup delays."}' | \
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/81/comments" \
            -d @-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
